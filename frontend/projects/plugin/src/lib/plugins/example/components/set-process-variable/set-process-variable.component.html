<p class="cds--label">
  This action sets a process variable to a given value during execution. Configure the variable name
  and the value it should be set to. The value can be a static string or a value resolved from the
  document using a value resolver (e.g. <code>doc:/customer/name</code>).
</p>

<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null
  } as obs"
>
  <v-input
    name="variableName"
    [title]="'variableName' | pluginTranslate: pluginId | async"
    [margin]="true"
    [disabled]="obs.disabled"
    [defaultValue]="obs.prefill?.variableName"
    [required]="true"
    [tooltip]="'variableNameTooltip' | pluginTranslate: pluginId | async"
    [widthPx]="350"
  >
  </v-input>
  <v-input
    name="variableValue"
    [title]="'variableValue' | pluginTranslate: pluginId | async"
    [margin]="true"
    [disabled]="obs.disabled"
    [defaultValue]="obs.prefill?.variableValue"
    [required]="true"
    [tooltip]="'variableValueTooltip' | pluginTranslate: pluginId | async"
    [widthPx]="350"
  >
  </v-input>
</v-form>
